name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and release (created if it does not exist as a release)
        required: true

permissions:
  contents: write

jobs:
  # Create the GitHub release once, before the matrix fans out, so the binary
  # jobs have something to upload to. Idempotent: a re-run or a pre-existing
  # release is fine.
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Ensure the release exists
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --generate-notes
          fi

  binaries:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="prdash_${{ matrix.goos }}_${{ matrix.goarch }}"
          go build -trimpath -ldflags "-s -w" -o "$out" .
          tar -czf "$out.tar.gz" "$out"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" "prdash_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" --clobber --repo "${{ github.repository }}"
